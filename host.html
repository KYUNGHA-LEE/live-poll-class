<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>강사 · 라이브 폴</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendard-dynamic-subset.min.css" />
  <link rel="stylesheet" href="styles.css" />
  <!-- 워드클라우드 엔진 (없으면 util.js가 자동 폴백) -->
  <script src="https://cdn.jsdelivr.net/npm/wordcloud@1.2.3/src/wordcloud2.js"></script>
</head>
<body>
  <div class="wrap">
    <div id="err" class="err hidden"></div>

    <!-- 1) 세션 없음: 새로 만들기 -->
    <section id="setup" class="card center hidden">
      <h1>강사 세션</h1>
      <p class="muted">새 세션을 만들면 학생들이 참여할 코드가 생성됩니다.</p>
      <button id="createBtn">+ 새 세션 만들기</button>
    </section>

    <!-- 2) 세션 있음 -->
    <section id="dash" class="hidden">
      <div class="card">
        <div class="row between" style="gap:28px; align-items:center">
          <div style="flex:1; min-width:260px">
            <div class="eyebrow">수강생 참여 링크 — 이 링크만 공유하세요</div>
            <div class="row" style="gap:8px; margin-top:10px; flex-wrap:nowrap">
              <input type="text" id="joinLink" class="grow" readonly onclick="this.select()" />
              <button id="copyBtn" style="white-space:nowrap">링크 복사</button>
            </div>
            <a id="joinOpen" href="#" target="_blank" class="muted"
               style="display:inline-block; margin-top:10px; font-size:13px">새 탭에서 미리 열어보기 ↗</a>
          </div>
          <div class="center">
            <img id="qr" class="qr" width="120" height="120" alt="참여 QR" />
            <div class="eyebrow" style="margin-top:6px">QR로 입장</div>
          </div>
          <div class="center" id="ptToggle" style="cursor:pointer" title="참여자 명단 보기 / 내보내기">
            <div class="eyebrow">참여 인원 ▾</div>
            <div class="count-big" id="ptCount">0</div>
          </div>
        </div>
      </div>

      <!-- 참여자 명단 (참여 인원 클릭 시 토글) -->
      <div id="ptPanel" class="card hidden">
        <div class="row between">
          <h2 style="margin:0">참여자 명단</h2>
          <button class="ghost" id="ptClose" style="padding:8px 16px">닫기</button>
        </div>
        <p class="muted" style="margin:6px 0 0">중복으로 들어온 참여자를 골라 <b>내보내기</b> 할 수 있어요. 내보내면 그 참여자의 응답도 함께 정리됩니다.</p>
        <div id="ptList" style="margin-top:12px"></div>
      </div>

      <div class="row" style="align-items:flex-start; gap:20px">
        <!-- 왼쪽: 슬라이드 편집 -->
        <div class="card grow" style="min-width:300px; flex:1">
          <h2>슬라이드</h2>
          <div id="slideList"></div>
          <hr style="border-color:var(--border); margin:16px 0" />
          <h2>+ 질문 추가</h2>
          <label>유형</label>
          <select id="qType">
            <option value="yesno">Yes / No (초기값 No → Yes로)</option>
            <option value="choice">4지선다 (많을수록 크게)</option>
            <option value="open">주관식 (워드클라우드)</option>
          </select>
          <label>질문</label>
          <input type="text" id="qText" placeholder="예: 실습 다 하셨나요?" />
          <div id="optBox" class="hidden">
            <label>보기 (한 줄에 하나)</label>
            <textarea id="qOpts" rows="4" placeholder="1번 보기&#10;2번 보기&#10;3번 보기&#10;4번 보기"></textarea>
          </div>
          <button id="addBtn" style="margin-top:10px">슬라이드 추가</button>
        </div>

        <!-- 오른쪽: 진행/결과 -->
        <div class="card grow" style="min-width:340px; flex:1.4">
          <div class="row between">
            <h2 id="progressLabel">진행</h2>
            <div class="row">
              <button class="ghost" id="prevBtn">‹ 이전</button>
              <button class="ghost" id="nextBtn">다음 ›</button>
            </div>
          </div>
          <div id="stage" class="stage">
            <div class="waiting">왼쪽에서 슬라이드를 추가하고<br/>“다음 ›”으로 진행을 시작하세요.</div>
          </div>
          <div class="row between" style="margin-top:14px">
            <span class="pill">응답 <b id="respCount" style="margin-left:6px">0</b></span>
            <button class="danger" id="resetBtn">↺ 응답 초기화 (다시 받기)</button>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script type="module" src="host.js"></script>
</body>
</html>
